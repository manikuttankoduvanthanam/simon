<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create New Case</title>

<style>
:root {
  --primary: #005eb8;
  --primary-hover: #004a93;
  --border: #d8dde3;
  --text: #212b36;
  --muted: #6b7280;
  --bg: #f5f7fa;
  --white: #fff;
  --radius: 8px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

.header{background:#0c0c0c;border-bottom:1px solid var(--border);position:sticky;top:0}
.header-inner{max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center}


.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-img {
  max-width: 70px;
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 12px;
}

.profile-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
}

.user-name {
  color: #ededed;
  font-weight: 500;
}



.logo{font-size:1.2rem;font-weight:700}

.container{max-width:760px;margin:auto;padding:1rem}
.breadcrumb{font-size:.875rem;color:var(--muted);margin-bottom:1rem}
.page-title{font-size:2rem;font-weight:700;margin-bottom:.5rem}
.page-description{color:var(--muted);margin-bottom:2rem}

.form-group{margin-bottom:1.5rem}
label{display:block;font-weight:600;margin-bottom:.25rem}
.hint{color:var(--muted);font-size:.875rem;margin-bottom:.5rem}
.required{color:#d5281b}

input,textarea{
width:100%;padding:.875rem;border:1px solid var(--border);
border-radius:var(--radius);font-size:1rem
}

.client-types{display:grid;grid-template-columns:1fr;gap:1rem}
.client-card{border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.client-card input{width:auto;margin-right:.75rem}
.client-card-content{display:flex}
.client-title{font-weight:600}
.client-description{color:var(--muted);font-size:.875rem}

.location-wrapper{display:flex;flex-direction:column;gap:.75rem}
.share-location{
align-self:flex-start;padding:.75rem 1rem;border:1px solid #9ec5fe;
background:#eef5ff;color:var(--primary);border-radius:var(--radius)
}

/* Voice Note */
.voice-box{
border:1px solid var(--border);
border-radius:12px;
background:#fff;
padding:1.5rem;
}
.voice-state{display:flex;align-items:center;gap:1.5rem}
.hidden{display:none}

.record-btn{
display:inline-flex;
align-items:center;
gap:.75rem;
border:1px solid var(--border);
background:white;
padding:.875rem 1rem;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.recording-indicator{
display:flex;
align-items:center;
gap:.75rem;
color:#d5281b;
font-size:1rem;
font-weight:700;
}

.recording-dot{
width:18px;height:18px;border-radius:50%;
background:#d5281b;
animation:pulse 1.2s infinite;
}

.stop-record-btn{
background:#d5281b;
color:#fff;
border:none;
padding:1rem 1.5rem;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2);opacity:.5}
100%{transform:scale(1)}
}

.play-pause-btn{
width:50px !important;height:50px;border:none;border-radius:50%;
background:var(--primary);color:#fff;font-size:1.5rem;cursor:pointer;
}

.audio-player{flex:1}
.audio-progress{display:flex;align-items:center;gap:1rem}
.progress-track{
flex:1;height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden
}
.progress-fill{width:35%;height:100%;background:var(--primary)}
.audio-actions{display:flex;gap:1rem}
.icon-btn{border:none;background:none;color:var(--muted);cursor:pointer;font-weight:600}

.form-actions{
display:flex;flex-direction:column-reverse;gap:.75rem;
margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border)
}

.btn{padding:.9rem 1.2rem;border-radius:var(--radius);font-weight:600;border:none;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:#fff;border:1px solid var(--border)}
.btn-link{background:none}

@media (min-width:768px){
.container{padding:2rem}
.client-types{grid-template-columns:1fr 1fr}
.form-actions{flex-direction:row;justify-content:space-between;align-items:center}
.action-right{display:flex;gap:1rem}
}

@media (max-width:768px){
.voice-state{flex-direction:column;align-items:stretch}
.play-pause-btn,.stop-record-btn{width:100%}
.audio-actions{justify-content:space-between}
.audio-progress{flex-wrap:wrap}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">

    <img
      class="logo-img"
      src="images/logo.png"
      alt="SOTS Logo">

    <div class="user-profile">

      <img
        src="images/user.jpeg"
        alt="Sarah Mitchell"
        class="profile-avatar">

      <span class="user-name">
        Sarah Mitchell
      </span>

    </div>

  </div>
</header>

<main class="container">

<h1 class="page-title">Create New Case</h1>
<p class="page-description">Enter the client details below to create a new case record.</p>

<form>
<!--
<div class="form-group">
<label>Client Type <span class="required">*</span></label>
<div class="hint">Select the type of client for this case record</div>
<div class="client-types">
<label class="client-card"><div class="client-card-content"><input type="radio" name="clientType"><div><div class="client-title">Caseload Client</div><div class="client-description">Actively managed within your caseload.</div></div></div></label>
<label class="client-card"><div class="client-card-content"><input type="radio" name="clientType"><div><div class="client-title">Non-Caseload Client</div><div class="client-description">Support only — not actively managed.</div></div></div></label>
</div>
</div>

-->

<div class="form-group">
<label>Full name or known name <span class="required">*</span></label>
<input type="text" placeholder="Full name or known name">
</div>

<div class="form-group">
<label>Phone Number <span class="optional"></span></label>
<input type="tel" placeholder="07123 456789">
</div>

<div class="form-group">
<label>Location <span class="required">*</span></label>
<div class="location-wrapper">
<input type="search" placeholder="Search or select a location">
<button type="button" class="share-location">📍 Share my location</button>
</div>
</div>

<div class="form-group">
<label>Case Notes</label>
<textarea rows="5" placeholder="Add important information"></textarea>
</div>

<div class="form-group">
<label>Voice Note <span class="hint">(optional)</span></label>
<div class="hint">Record a brief spoken note to attach to this case. Once recorded, you can play back, view the transcript, or copy the transcript into your notes.</div>

<div class="voice-box">

<div id="voiceIdle" class="voice-state">
<button type="button" class="record-btn" onclick="startRecording()">🎤 Start Recording</button>
</div>

<div id="voiceRecording" class="voice-state hidden">
<div class="recording-indicator">
<span class="recording-dot"></span>
<span>Recording <span id="recordTimer">00:00</span></span>
</div>
<button type="button" class="stop-record-btn" onclick="stopRecording()">⏹ Stop Recording</button>
</div>

<div id="voicePlayback" class="voice-state hidden">
<button type="button" class="play-pause-btn" onclick="togglePlayback()"><span id="playIcon">▶</span></button>

<div class="audio-player">
<div class="audio-progress">
<span id="elapsedTime">0:05</span>
<div class="progress-track"><div class="progress-fill"></div></div>
<span>00:00</span>
</div>
</div>

<div class="audio-actions">
<button type="button" class="icon-btn" onclick="deleteRecording()">🗑 Delete</button>
<button type="button" class="icon-btn" onclick="reRecord()">↺ Re-record</button>
</div>
</div>

</div>
</div>

<div class="form-actions">
<button type="button" class="btn btn-link">Cancel</button>
<div class="action-right">
<button type="button" class="btn btn-secondary">Save Draft</button>
<button type="submit" class="btn btn-primary">Create Case</button>
</div>
</div>

</form>
</main>

<script>
let recordingTimer;
let seconds=0;
let isPlaying=false;

function startRecording(){
document.getElementById('voiceIdle').classList.add('hidden');
document.getElementById('voiceRecording').classList.remove('hidden');
seconds=0;
recordingTimer=setInterval(()=>{
seconds++;
const mins=String(Math.floor(seconds/60)).padStart(2,'0');
const secs=String(seconds%60).padStart(2,'0');
document.getElementById('recordTimer').textContent=`${mins}:${secs}`;
},1000);
}

function stopRecording(){
clearInterval(recordingTimer);
document.getElementById('voiceRecording').classList.add('hidden');
document.getElementById('voicePlayback').classList.remove('hidden');
document.getElementById('elapsedTime').textContent=formatTime(seconds);
}

function deleteRecording(){
document.getElementById('voicePlayback').classList.add('hidden');
document.getElementById('voiceIdle').classList.remove('hidden');
seconds=0;
}

function reRecord(){
document.getElementById('voicePlayback').classList.add('hidden');
startRecording();
}

function togglePlayback(){
isPlaying=!isPlaying;
document.getElementById('playIcon').textContent=isPlaying?'⏸':'▶';
}

function formatTime(total){
const mins=Math.floor(total/60);
const secs=total%60;
return `${mins}:${String(secs).padStart(2,'0')}`;
}
</script>

</body>
</html>
